<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OneShot Currency</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --text: #000000;
            --label: #8e8e93;
            --input-bg: #f2f2f7;
            --primary: #007aff;
        }

        @media(prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1c1c1e;
                --text: #ffffff;
                --label: #8e8e93;
                --input-bg: #2c2c2e;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overscroll-behavior: none;
            overflow: hidden;
            max-width: 600px;    /* 1. 폭의 한계를 600px로 제한 */
            margin: 0 auto;      /* 2. PC화면에서 가운데로 정렬 */
            position: relative;
            box-shadow: 0 0 80px rgba(0,0,0,0.1);
        }

        .top-info {
            /* 노치 높이(safe-area)에 딱 15px만 더해서 어떤 기기던 동일한 여백 부여 */
            padding: calc(env(safe-area-inset-top) + 40px) 25px 10px 25px; 
            flex-shrink: 0;
            /* 만약 제목이 너무 붙어 보인다면 15px 숫자를 조금씩 키워봐 */
        }

        h2 {
            font-size: 30px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--text);
        }

        .guide-text {
            font-size: 13px;
            color: var(--label);
            font-weight: 400;
            line-height: 1.5;
            margin-top: 8px;
        }

        .bottom-area {
            margin-top: auto;
            display: flex;
            flex-direction: column;
        }

        .container-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--card);
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
            /* 아래 세 줄이 무한 확장의 핵심 */
            flex: 1; 
            max-height: none; 
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        #inputs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px;
            max-height: 50vh;
            overflow-y: auto;
            padding: 2px;
            -webkit-overflow-scrolling: touch;
        }

        .input-group {
            background: var(--input-bg);
            padding: 8px 10px;
            border-radius: 16px;
            border: 2px solid transparent;
            transition: all .3s ease;
            display: flex;
            flex-direction: column;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            background: var(--card);
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
            transform: translateY(-1px);
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .flag-icon {
            width: 16px;
            height: 12px;
            object-fit: cover;
            border-radius: 2px;
            box-shadow: 0 0 1px rgba(0,0,0,0.2);
        }

        label {
            font-size: 10px;
            font-weight: 700;
            color: var(--label);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        input {
            width: 100%;
            border: none;
            background: transparent;
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            outline: none;
            padding: 0;
        }

        .tip-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 5px;
        }

        .tip-btn {
            padding: 14px 5px;
            border: none;
            border-radius: 14px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            /* 추가: 부드러운 변화를 위해 0.1초 동안 작동 */
            transition: transform 0.1s ease, background-color 0.1s ease, opacity 0.1s ease;
        }

/* 추가: 버튼을 누르고 있는 동안(active)의 상태 */
.tip-btn:active {
    transform: scale(0.95); /* 크기를 5% 줄여서 꾹 눌리는 느낌 */
    background-color: #0056b3; /* 색상을 조금 더 진하게 변경 */
    opacity: 0.9; /* 살짝 투명하게 */
}

        .status {
            font-size: 10px;
            text-align: center;
            color: var(--label);
            font-weight: 600;
            padding-top: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="top-info">
    <h2 id="title" style="display: inline;">🌏 세계여행 환율 계산기</h2>
    <div class="guide-text" id="guide">
        금액을 입력하면 모든 통화가 즉시 변환됩니다.<br>
        하단 버튼을 눌러 빠르게 팁을 추가해 보세요.
    </div>
</div>

<div class="bottom-area">
    <div class="container-card">
        <div id="inputs"></div>
        <div class="tip-container">
            <button class="tip-btn" onclick="applyTip(1.05)">+5%</button>
            <button class="tip-btn" onclick="applyTip(1.1)">+10%</button>
            <button class="tip-btn" onclick="applyTip(1.15)">+15%</button>
            <button class="tip-btn" onclick="applyTip(1.2)">+20%</button>
        </div>
        <div class="status" id="last-update">Updating...</div>
    </div>
</div>

<script>
    // 요청하신 통화 순서 및 국가 코드 매핑
    const currencies = [
        {code:'GBP', name:'United Kingdom', nameKo:'영국', iso:'gb'},
        {code:'AED', name:'U.A.E', nameKo:'아랍에미리트', iso:'ae'},
        {code:'EUR', name:'European Union', nameKo:'유럽연합', iso:'eu'},
        {code:'CZK', name:'Czech Republic', nameKo:'체코', iso:'cz'},
        {code:'HUF', name:'Hungary', nameKo:'헝가리', iso:'hu'},
        {code:'TRY', name:'Turkey', nameKo:'터키', iso:'tr'},
        {code:'USD', name:'United States', nameKo:'미국', iso:'us'},
        {code:'KRW', name:'South Korea', nameKo:'대한민국', iso:'kr'},
        
    ];

    const i18n = {
        ko: {
            title: "🌏 원샷 환율 계산기",
            guide: "금액을 입력하면 모든 통화가 즉시 변환됩니다.<br>하단 버튼을 눌러 빠르게 팁을 추가해 보세요.",
            update: "✅ 업데이트:",
            cached: "🟡 캐시된 환율:",
            offline: "⚠️ 오프라인 모드"
        },
        en: {
            title: "🌎 One Shot Currency",
            guide: "Enter an amount to convert all currencies instantly.<br>Tab the buttons below to add tips quickly.",
            update: "✅ Updated:",
            cached: "🟡 Cached Rate:",
            offline: "⚠️ Offline Cached"
        }
    };

    let rates = {};
    const baseCurrency = 'USD'; // 기준 통화 달러 고정
    let lastFocusedId = localStorage.getItem('lastFocusedCurrency') || 'USD';
    const userLang = navigator.language.startsWith('ko') ? 'ko' : 'en';

    // UI 언어 설정
    document.getElementById('title').innerText = i18n[userLang].title;
    document.getElementById('guide').innerHTML = i18n[userLang].guide;

    function renderInputs() {
    const container = document.getElementById('inputs');
    container.innerHTML = '';

    currencies.forEach(cur => {
        const group = document.createElement('div');
        group.className = 'input-group';
        
        // 언어에 따라 표시할 이름 선택
        const displayName = userLang === 'ko' ? cur.nameKo : cur.name;

        group.innerHTML = `
            <div class="label-row">
                <img loading="lazy" class="flag-icon" src="https://flagcdn.com/w40/${cur.iso}.png" alt="${cur.code}">
                <label>${cur.code} (${displayName})</label>
            </div>
            <input type="text" 
                   inputmode="decimal" 
                   pattern="[0-9.]*"
                   id="${cur.code}" 
                   placeholder="0" 
                   oninput="handleInput('${cur.code}')" 
                   onfocus="saveFocus('${cur.code}')"
                   onclick="this.select()">
        `;
        container.appendChild(group);
    });

    setTimeout(() => {
        const lastEl = document.getElementById(lastFocusedId);
        if(lastEl) lastEl.focus();
    }, 100);
}

    function saveFocus(code) {
        lastFocusedId = code;
        localStorage.setItem('lastFocusedCurrency', code);
    }

    async function fetchRates() {
        const CACHE_KEY = `rates_fixed_usd`;
        const TIME_KEY = `rates_time_fixed_usd`;
        const TWELVE_HOURS = 12 * 60 * 60 * 1000;
        const now = Date.now();
        const lastFetch = localStorage.getItem(TIME_KEY);

        if (lastFetch && now - lastFetch < TWELVE_HOURS) {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {     rates = JSON.parse(cached); } catch (e) {     localStorage.removeItem(CACHE_KEY); }
                document.getElementById('last-update').innerText = 
                    `${i18n[userLang].cached} ${new Date(parseInt(lastFetch)).toLocaleTimeString()}`;
                renderInputs();
                return;
            }
        }

        try {
            const res = await fetch(`https://open.er-api.com/v6/latest/${baseCurrency}`);
            const data = await res.json();
            if (data.result === "success") {
                rates = data.rates;
                localStorage.setItem(CACHE_KEY, JSON.stringify(rates));
                localStorage.setItem(TIME_KEY, now);
                document.getElementById('last-update').innerText = 
                    `${i18n[userLang].update} ${new Date().toLocaleTimeString()}`;
            }
        } catch (e) {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {     rates = JSON.parse(cached); } catch (e) {     localStorage.removeItem(CACHE_KEY); }
                document.getElementById('last-update').innerText = i18n[userLang].offline;
            }
        }
        renderInputs();
    }

    function formatCurrency(code, value) {
        if (value === 0) return '';
        const noDecimal = ['KRW', 'JPY', 'VND', 'HUF', 'IDR'];
        return Number(value).toLocaleString(undefined, {
            minimumFractionDigits: 0,
            maximumFractionDigits: noDecimal.includes(code) ? 0 : 2
        });
    }

    function handleInput(code) {
    const el = document.getElementById(code);
    
    // 1. 숫자와 마침표(.)를 제외한 모든 문자 제거
    let val = el.value.replace(/[^0-9.]/g, '');
    
    // 2. 마침표가 여러 개 들어오는 것 방지 (첫 번째 것만 인정)
    const points = val.split('.');
    if (points.length > 2) {
        val = points[0] + '.' + points.slice(1).join('');
    }

    // 화면에 깨끗해진 숫자 반영
    el.value = val;

    // 계산 로직 실행 (기존 replaceAll 유지)
    let cleanVal = val.replaceAll(',', '');
    if (cleanVal === '' || isNaN(cleanVal)) {
        updateAll(code, 0);
        return;
    }
    updateAll(code, parseFloat(cleanVal));
}

    function updateAll(changedCode, val) {
        if (!rates[changedCode]) return;
        const usdVal = val / rates[changedCode]; // 모든 입력을 USD로 환산 후 계산
        currencies.forEach(c => {
            const targetEl = document.getElementById(c.code);
            if (targetEl && c.code !== changedCode) {
                const result = usdVal * rates[c.code];
                targetEl.value = formatCurrency(c.code, result);
            }
        });
    }

    function applyTip(ratio) {
        const el = document.getElementById(lastFocusedId);
        let val = parseFloat(el.value.replaceAll(',', ''));
        if (!isNaN(val)) {
            const tipped = val * ratio;
            el.value = formatCurrency(lastFocusedId, tipped);
            updateAll(lastFocusedId, tipped);
        }
    }

    renderInputs(); fetchRates();
</script>

</body>
</html>
